<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Birthday Surprise ❤️</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Pacifico&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Poppins, sans-serif;
      }

      body {
        overflow: hidden;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ffd6e8, #ffc1d9, #ffb3d1, #ffd9ec);
        position: relative;
      }

      /* Floating Hearts */

      .heart {
        position: absolute;
        color: #ff4f93;
        font-size: 20px;
        animation: float linear infinite;
        opacity: 0.6;
      }

      @keyframes float {
        0% {
          transform: translateY(100vh) scale(0.5);
          opacity: 0;
        }

        20% {
          opacity: 0.7;
        }

        100% {
          transform: translateY(-120vh) scale(1.5);
          opacity: 0;
        }
      }

      /* Login Card */

      .card {
        width: 360px;
        padding: 35px;
        text-align: center;

        background: rgba(255, 255, 255, 0.25);

        backdrop-filter: blur(12px);

        border-radius: 25px;

        box-shadow: 0 10px 35px rgba(0, 0, 0, 0.15);

        z-index: 2;
      }

      .card h1 {
        font-family: Pacifico;
        color: #ff2d75;
        margin-bottom: 15px;
      }

      .cute {
        font-size: 70px;
        margin-bottom: 10px;
      }

      p {
        color: #6b2347;
        margin-bottom: 18px;
      }

      input {
        width: 100%;
        padding: 14px;
        border: none;
        outline: none;
        border-radius: 12px;
        margin-bottom: 18px;
        font-size: 16px;
        text-align: center;
      }

      button {
        width: 100%;
        padding: 14px;
        background: #ff4d94;
        color: white;
        font-size: 17px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #ff1975;
        transform: scale(1.03);
      }

      #error {
        margin-top: 15px;
        color: red;
        font-size: 14px;
      }

      /* Surprise */

      #surprise {
        display: none;
        text-align: center;
        animation: fade 1s;
      }

      #surprise h1 {
        font-size: 45px;
        font-family: Pacifico;
        color: #ff2b7a;
      }

      #surprise h2 {
        margin: 20px 0;
        color: #8a2454;
      }

      #surprise p {
        font-size: 20px;
      }

      .big {
        font-size: 90px;
        animation: bounce 1.5s infinite;
      }

      @keyframes bounce {
        50% {
          transform: translateY(-15px);
        }
      }

      @keyframes fade {
        from {
          opacity: 0;
          transform: scale(0.8);
        }

        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .sparkle {
        position: absolute;
        font-size: 30px;
        animation: spin 6s linear infinite;
      }

      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div id="hearts"></div>

    <div class="sparkle" style="top: 8%; left: 8%">✨</div>
    <div class="sparkle" style="bottom: 10%; right: 8%">🌸</div>
    <div class="sparkle" style="top: 20%; right: 12%">🎀</div>

    <div class="card" id="login">
      <div class="cute">🧸🎂🎈</div>

      <h1>Birthday Surprise</h1>

      <p>Enter your Date of Birth to unlock your special surprise ❤️</p>

      <input type="text" id="dob" placeholder="DD/MM/YYYY" />

      <button onclick="login()">Unlock 🎁</button>

      <div id="error"></div>
    </div>

    <div class="card" id="surprise">
      <div class="big">🎂💖</div>

      <h1>Happy Birthday Sarthika!</h1>
      <p>
        May your day be filled with happiness, love, smiles, cake, gifts and
        endless joy. 💕✨
      </p>
      <button onclick="nextpage()">Cake cut🎁</button>

      <br />

      <div style="font-size: 20px">🎁🎂🧸🌹🎈🍰💝</div>
    </div>

    <script>
      function nextpage() {
        window.location.href = "cake cut.html";
      }

      const correctDOB = "20/07/2007";

      function login() {
        let dob = document.getElementById("dob").value.trim();

        if (dob === correctDOB) {
          document.getElementById("login").style.display = "none";

          document.getElementById("surprise").style.display = "block";
        } else {
          document.getElementById("error").innerHTML =
            "❌ Incorrect Date of Birth";
        }
      }

      // Floating Hearts

      const container = document.getElementById("hearts");

      function createHeart() {
        let heart = document.createElement("div");

        heart.className = "heart";

        heart.innerHTML = "❤";

        heart.style.left = Math.random() * 100 + "vw";

        heart.style.fontSize = 15 + Math.random() * 35 + "px";

        heart.style.animationDuration = 6 + Math.random() * 8 + "s";

        container.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 14000);
      }

      setInterval(createHeart, 300);
    </script>
  </body>
</html>
